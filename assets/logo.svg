<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fangGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#00A8CC"/>
    </linearGradient>
  </defs>
  
  <!-- Background hexagon -->
  <path d="M256 32L470 143V369L256 480L42 369V143L256 32Z" 
        fill="none" stroke="url(#fangGrad)" stroke-width="16"/>
  
  <!-- Inner hexagon -->
  <path d="M256 80L426 167V345L256 432L86 345V167L256 80Z" 
        fill="url(#fangGrad)" opacity="0.2"/>
  
  <!-- Fang/Wolf icon -->
  <g transform="translate(256, 256)">
    <!-- Wolf head abstract -->
    <path d="M-80 -60 L-60 -100 L-20 -60 L0 -80 L20 -60 L60 -100 L80 -60 
             L60 20 L80 60 L40 80 L0 100 L-40 80 L-80 60 L-60 20 Z" 
          fill="url(#fangGrad)"/>
    
    <!-- Eyes -->
    <ellipse cx="-25" cy="-10" rx="12" ry="15" fill="#1a1a2e"/>
    <ellipse cx="25" cy="-10" rx="12" ry="15" fill="#1a1a2e"/>
    
    <!-- Eye highlights -->
    <circle cx="-20" cy="-15" r="4" fill="white"/>
    <circle cx="30" cy="-15" r="4" fill="white"/>
    
    <!-- Nose -->
    <path d="M-12 30 L0 40 L12 30 Z" fill="#1a1a2e"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="48" font-weight="bold" fill="url(#fangGrad)">OpenFang</text>
</svg>
